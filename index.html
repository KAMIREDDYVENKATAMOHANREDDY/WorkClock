<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HMIE WorkClock</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #050a14; --card: #0e1a2d; --accent: #38bdf8; --success: #4ade80; --danger: #f87171; --warn: #fbbf24; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #e2e8f0; padding-bottom: 90px; }
        .hdr { position: sticky; top: 0; background: rgba(5, 10, 20, 0.9); backdrop-filter: blur(10px); padding: 20px; border-bottom: 1px solid #1e293b; z-index: 100; }
        .hdr-title { font-size: 20px; font-weight: 800; color: #fff; }
        .body { padding: 16px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .status-box { padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-bottom: 15px; text-align: center; }
        .action-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.1s; }
        .btn-in { background: var(--success); color: #052e16; }
        .btn-out { background: var(--danger); color: white; }
        .nav-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #1e293b; background: #0f172a; color: #94a3b8; font-size: 11px; font-weight: 700; }
        .nav-btn.active { background: var(--accent); color: #000; }
        .bnav { position: fixed; bottom: 0; width: 100%; background: #050a14; display: flex; border-top: 1px solid #1e293b; height: 75px; }
        .bb { flex: 1; background: none; border: none; color: #475569; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
        .bb.active { color: var(--accent); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="hdr">
    <div class="hdr-title">HMIE WorkClock</div>
    <div style="display:flex; gap:5px; margin-top:10px;">
        <button class="nav-btn active" id="nb-today" onclick="sv('today')">DASHBOARD</button>
        <button class="nav-btn" id="nb-week" onclick="sv('week')">WEEKLY LOG</button>
    </div>
</div>

<div class="body">
    <div id="view-today">
        <div id="week-status-box" class="status-box">Calculating Weekly Goal...</div>
        
        <div class="card" style="text-align:center;">
            <div id="dist-info" style="font-size:12px; color:#94a3b8; margin-bottom:10px;">GPS Initializing...</div>
            <div id="quick-log"></div>
        </div>

        <div class="card">
            <div style="font-size:12px; font-weight:800; color:var(--accent); margin-bottom:10px;">MANUAL LOG / NOTE</div>
            <input type="date" id="f-date" style="width:100%; background:#070f1a; border:1px solid #1e293b; padding:12px; border-radius:10px; color:white; margin-bottom:10px;">
            <input type="text" id="f-note" placeholder="Note (e.g. On-site, WFH)" style="width:100%; background:#070f1a; border:1px solid #1e293b; padding:12px; border-radius:10px; color:white;">
        </div>
    </div>

    <div id="view-week" class="hidden"></div>
</div>

<div class="bnav">
    <button class="bb active" onclick="sv('today')"><span>📝</span><span>LOG</span></button>
    <button class="bb" onclick="renderWeek()"><span>📅</span><span>HISTORY</span></button>
    <button class="bb" onclick="exportXL()"><span>📥</span><span>EXPORT</span></button>
    <button class="bb" onclick="clearData()"><span>🗑️</span><span>RESET</span></button>
</div>

<script>
// CONFIG: HMIE Office Location
const HMIE = { lat: 17.4746, lng: 78.3745, radius: 150 };
const SK = "hmie_work_logs";

let entries = JSON.parse(localStorage.getItem(SK)) || [];

function save() { localStorage.setItem(SK, JSON.stringify(entries)); renderQuickLog(); checkWeeklyStatus(); }
function today() { return new Date().toISOString().split("T")[0]; }
function nowHM() { return new Date().toTimeString().slice(0,5); }

// --- GPS MONITORING ---
function getDist(la1, lo1, la2, lo2) {
    const R = 6371000;
    const dLat = (la2-la1)*Math.PI/180; const dLon = (lo2-lo1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
    return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function updateGPS() {
    if(!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
        const d = getDist(pos.coords.latitude, pos.coords.longitude, HMIE.lat, HMIE.lng);
        const atWork = d <= HMIE.radius;
        document.getElementById('dist-info').innerHTML = atWork ? 
            `<span style="color:var(--success)">● AT HMIE OFFICE (${d}m)</span>` : 
            `<span style="color:var(--danger)">● AWAY FROM HMIE (${d}m)</span>`;
            
        // Trigger notification if arriving
        if(atWork && !entries.find(e => e.date === today())) {
            sendPush("Arrived at HMIE", "Don't forget to log your login!");
        }
    }, null, {enableHighAccuracy: true});
}
setInterval(updateGPS, 10000);

// --- LOGGING WITH 5M BUFFER ---
function doLogin() {
    alert("Safety Buffer Active: Entry will be recorded in 5 minutes.");
    setTimeout(() => {
        entries.push({ 
            id: Date.now(), 
            date: today(), 
            loginTime: nowHM(), 
            logoutTime: "", 
            totalHours: 0, 
            note: document.getElementById('f-note').value || "Office" 
        });
        save();
        sendPush("Logged In", "Shift successfully started at HMIE.");
    }, 300000); // 5 Minutes
}

function doLogout() {
    let e = entries.find(x => x.date === today() && !x.logoutTime);
    if(e) {
        e.logoutTime = nowHM();
        let [ih, im] = e.loginTime.split(":").map(Number);
        let [oh, om] = e.logoutTime.split(":").map(Number);
        let mins = (oh*60+om) - (ih*60+im);
        e.totalHours = (mins/60).toFixed(2);
        save();
    }
}

// --- WEEKLY GOAL (42.5h) ---
function monKey(dStr) {
    let d = new Date(dStr); let day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.setDate(diff)).toISOString().split("T")[0];
}

function checkWeeklyStatus() {
    const k = monKey(today());
    const weekLogs = entries.filter(e => monKey(e.date) === k);
    const total = weekLogs.reduce((s, e) => s + parseFloat(e.totalHours || 0), 0);
    const target = 42.5;
    const box = document.getElementById('week-status-box');
    
    if (total < target) {
        box.style.background = "#422006"; box.style.color = "#fbbf24";
        box.innerHTML = `⚠️ Weekly Goal: ${total.toFixed(2)} / ${target}h (Short: ${(target - total).toFixed(2)}h)`;
    } else {
        box.style.background = "#064e3b"; box.style.color = "#34d399";
        box.innerHTML = `✅ Goal Met: ${total.toFixed(2)} hours complete!`;
    }
}

// --- UI HELPERS ---
function sv(v) {
    document.getElementById('view-today').classList.toggle('hidden', v!=='today');
    document.getElementById('view-week').classList.toggle('hidden', v!=='week');
    document.getElementById('nb-today').classList.toggle('active', v==='today');
    document.getElementById('nb-week').classList.toggle('active', v==='week');
}

function renderQuickLog() {
    const box = document.getElementById('quick-log');
    const active = entries.find(e => e.date === today() && !e.logoutTime);
    box.innerHTML = active ? `<button class="action-btn btn-out" onclick="doLogout()">🔴 LOG LOGOUT</button>` : `<button class="action-btn btn-in" onclick="doLogin()">🟢 LOG LOGIN</button>`;
}

function renderWeek() {
    sv('week');
    const view = document.getElementById('view-week');
    view.innerHTML = entries.slice().reverse().map(e => `
        <div class="card"><div style="display:flex; justify-content:space-between;">
            <span><b>${e.date}</b></span><span>${e.loginTime}-${e.logoutTime || '...'}</span><b>${e.totalHours}h</b>
        </div></div>`).join("");
}

function sendPush(t, b) {
    if ("Notification" in window && Notification.permission === "granted") new Notification(t, {body:b});
}

function exportXL() {
    const ws = XLSX.utils.json_to_sheet(entries);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "HMIE_Logs");
    XLSX.writeFile(wb, "HMIE_Work_Report.xlsx");
}

function clearData() { if(confirm("Clear all logs?")) { localStorage.clear(); location.reload(); } }

window.onload = () => {
    if ("Notification" in window) Notification.requestPermission();
    document.getElementById('f-date').value = today();
    renderQuickLog();
    checkWeeklyStatus();
    updateGPS();
};
</script>
</body>
</html>
