<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HMIE WorkClock Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #050a14; --card: #0e1a2d; --accent: #38bdf8; --success: #4ade80; --danger: #f87171; --warn: #fbbf24; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #e2e8f0; padding-bottom: 90px; }
        .hdr { position: sticky; top: 0; background: rgba(5, 10, 20, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; border-bottom: 1px solid #1e293b; z-index: 100; }
        .hdr-title { font-size: 20px; font-weight: 800; color: #fff; }
        .body { padding: 16px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 12px; }
        .card-title { font-size: 11px; font-weight: 800; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; }
        input { width: 100%; background: #070f1a; border: 1px solid #1e293b; padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px; font-size: 16px; }
        .action-btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-size: 15px; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        .btn-in { background: var(--success); color: #052e16; }
        .btn-out { background: var(--danger); color: white; }
        .meal-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #1e293b; background: #070f1a; color: #475569; font-size: 11px; font-weight: 700; }
        .meal-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .bnav { position: fixed; bottom: 0; width: 100%; background: #050a14; display: flex; border-top: 1px solid #1e293b; height: 75px; }
        .bb { flex: 1; background: none; border: none; color: #475569; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
        .bb.active { color: var(--accent); }
        .hidden { display: none !important; }
        .status-pill { padding: 10px; border-radius: 12px; text-align: center; font-size: 13px; font-weight: 700; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="hdr">
    <div class="hdr-title">HMIE WorkClock Pro</div>
</div>

<div class="body">
    <div id="view-today">
        <div id="week-status" class="status-pill"></div>
        
        <div class="card" style="text-align:center;">
            <div id="dist-info" style="font-size:12px; color:#94a3b8; margin-bottom:12px;">GPS Initializing...</div>
            <div id="quick-log"></div>
        </div>

        <div class="card">
            <div class="card-title">Manual Log & Food Deductions</div>
            <label style="font-size:10px; color:#475569;">DATE</label>
            <input type="date" id="f-date">
            
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label style="font-size:10px; color:#475569;">IN</label><input type="time" id="f-login"></div>
                <div style="flex:1;"><label style="font-size:10px; color:#475569;">OUT</label><input type="time" id="f-logout"></div>
            </div>

            <label style="font-size:10px; color:#475569; display:block; margin-bottom:8px;">MEAL BREAKS (-30m each)</label>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button id="mb-b" class="meal-btn" onclick="togMeal('b')">🥐 Breakfast OFF</button>
                <button id="mb-l" class="meal-btn" onclick="togMeal('l')">🍱 Lunch OFF</button>
            </div>

            <input type="text" id="f-note" placeholder="Add a note (e.g. Site Visit)">
            <button class="action-btn" style="background:var(--accent); color:#000;" onclick="saveManual()">💾 Save Entry</button>
        </div>
    </div>

    <div id="view-week" class="hidden"></div>
</div>

<div class="bnav">
    <button class="bb active" onclick="sv('today')"><span>📝</span><span>LOG</span></button>
    <button class="bb" onclick="renderWeek()"><span>📅</span><span>HISTORY</span></button>
    <button class="bb" onclick="exportXL()"><span>📥</span><span>EXPORT</span></button>
    <button class="bb" onclick="resetApp()"><span>🗑️</span><span>RESET</span></button>
</div>

<script>
const HMIE = { lat: 17.4746, lng: 78.3745, radius: 150 };
const SK = "hmie_pro_v5";
let entries = JSON.parse(localStorage.getItem(SK)) || [];
let meals = { b: false, l: false };

function save() { localStorage.setItem(SK, JSON.stringify(entries)); renderQuickLog(); checkGoal(); }
function today() { return new Date().toISOString().split("T")[0]; }
function nowHM() { return new Date().toTimeString().slice(0,5); }

// --- GPS ENGINE ---
function getDist(la1, lo1, la2, lo2) {
    const R = 6371000; const dLat = (la2-la1)*Math.PI/180; const dLon = (lo2-lo1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
    return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function updateGPS() {
    if(!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
        const d = getDist(pos.coords.latitude, pos.coords.longitude, HMIE.lat, HMIE.lng);
        const atWork = d <= HMIE.radius;
        document.getElementById('dist-info').innerHTML = atWork ? `<span style="color:var(--success)">● AT HMIE DESK (${d}m)</span>` : `<span style="color:var(--danger)">● AWAY (${d}m)</span>`;
        if(atWork && !entries.find(e => e.date === today())) sendPush("HMIE Detected", "Tap to Log Login.");
    }, null, {enableHighAccuracy: true});
}
setInterval(updateGPS, 10000);

// --- CALCULATION LOGIC ---
function calc(i, o, b, l) {
    if(!i || !o) return 0;
    let [ih, im] = i.split(":").map(Number); let [oh, om] = o.split(":").map(Number);
    let mins = (oh*60+om) - (ih*60+im);
    if(b) mins -= 30; if(l) mins -= 30;
    return Math.max(0, mins/60).toFixed(2);
}

function saveManual() {
    const d = document.getElementById('f-date').value;
    const i = document.getElementById('f-login').value;
    const o = document.getElementById('f-logout').value;
    if(!d || !i || !o) return alert("Enter Date and Times");
    entries.push({ id: Date.now(), date: d, loginTime: i, logoutTime: o, breakfast: meals.b, lunch: meals.l, totalHours: calc(i,o,meals.b,meals.l), note: document.getElementById('f-note').value });
    save(); alert("Manual Entry Saved!");
}

// --- GOAL TRACKER (Mon-Fri) ---
function monKey(dStr) {
    let d = new Date(dStr); let day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.setDate(diff)).toISOString().split("T")[0];
}

function checkGoal() {
    const k = monKey(today());
    const weekLogs = entries.filter(e => {
        const day = new Date(e.date).getDay();
        return monKey(e.date) === k && day !== 0 && day !== 6; // Monday-Friday only
    });
    const total = weekLogs.reduce((s, e) => s + parseFloat(e.totalHours || 0), 0);
    const target = 42.5; const el = document.getElementById('week-status');
    
    if(total < target) {
        el.style.background = "#422006"; el.style.color = "#fbbf24";
        el.innerHTML = `⚠️ Weekly Progress (M-F): ${total.toFixed(2)}h / ${target}h`;
    } else {
        el.style.background = "#064e3b"; el.style.color = "#34d399";
        el.innerHTML = `✅ Weekly Goal Met: ${total.toFixed(2)}h`;
    }
}

// --- APP HELPERS ---
function togMeal(m) {
    meals[m] = !meals[m];
    document.getElementById('mb-'+m).classList.toggle('on', meals[m]);
    document.getElementById('mb-'+m).textContent = (m==='b'?'🥐 Breakfast ':'🍱 Lunch ') + (meals[m]?'ON':'OFF');
}

function renderQuickLog() {
    const box = document.getElementById('quick-log');
    const active = entries.find(e => e.date === today() && !e.logoutTime);
    box.innerHTML = active ? `<button class="action-btn btn-out" onclick="doLogout()">🔴 Log Logout</button>` : `<button class="action-btn btn-in" onclick="doLogin()">🟢 Log Login (5m Buffer)</button>`;
}

function doLogin() {
    alert("5-Minute Safety Buffer Active.");
    setTimeout(() => {
        entries.push({ id: Date.now(), date: today(), loginTime: nowHM(), logoutTime: "", breakfast: meals.b, lunch: meals.l, totalHours: 0, note: "HMIE Office" });
        save();
    }, 300000);
}

function doLogout() {
    let e = entries.find(x => x.date === today() && !x.logoutTime);
    if(e) { e.logoutTime = nowHM(); e.totalHours = calc(e.loginTime, e.logoutTime, e.breakfast, e.lunch); save(); }
}

function renderWeek() {
    sv('week');
    const view = document.getElementById('view-week');
    view.innerHTML = `<div class="card-title">All History</div>` + entries.slice().reverse().map(e => `
        <div class="card"><div style="display:flex; justify-content:space-between; font-size:13px;">
            <span><b>${e.date}</b></span><span>${e.loginTime}-${e.logoutTime || '...'}</span><b>${e.totalHours}h</b>
        </div></div>`).join("");
}

function sv(v) {
    document.getElementById('view-today').classList.toggle('hidden', v!=='today');
    document.getElementById('view-week').classList.toggle('hidden', v!=='week');
}

function sendPush(t, b) { if ("Notification" in window && Notification.permission === "granted") new Notification(t, {body:b}); }
function exportXL() { XLSX.writeFile(XLSX.utils.book_append_sheet(XLSX.utils.book_new(), XLSX.utils.json_to_sheet(entries), "HMIE_Logs"), "HMIE_Report.xlsx"); }
function resetApp() { if(confirm("Clear all?")) { localStorage.clear(); location.reload(); } }

window.onload = () => {
    if ("Notification" in window) Notification.requestPermission();
    document.getElementById('f-date').value = today();
    renderQuickLog(); checkGoal(); updateGPS();
};
</script>
</body>
</html>
